<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Linux 入門電子書封面分享圖</title>
  <desc id="desc">適合 GitHub Pages 分享的 Linux 入門電子書封面圖。</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f4efe6"/>
      <stop offset="100%" stop-color="#d7b69e"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fffdf8"/>
      <stop offset="100%" stop-color="#f5e7d8"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="146" cy="112" r="140" fill="#ffffff" opacity="0.3"/>
  <circle cx="1080" cy="560" r="180" fill="#b45a3c" opacity="0.12"/>
  <rect x="86" y="78" width="1028" height="474" rx="36" fill="url(#card)" stroke="#d7bea9" stroke-width="2"/>
  <rect x="152" y="138" width="310" height="336" rx="24" fill="#2e241c"/>
  <rect x="176" y="162" width="262" height="288" rx="18" fill="#fffaf2"/>
  <path d="M216 228h180M216 268h180M216 308h150" stroke="#b45a3c" stroke-linecap="round" stroke-width="14"/>
  <text x="520" y="222" fill="#7d6b5d" font-family="'Noto Serif TC', serif" font-size="34" letter-spacing="4">GitHub Pages Edition</text>
  <text x="520" y="320" fill="#2e241c" font-family="'Noto Serif TC', serif" font-size="92" font-weight="700">Linux 入門</text>
  <text x="520" y="390" fill="#7d6b5d" font-family="'Noto Serif TC', serif" font-size="38">基礎 Linux 教學電子書</text>
  <text x="520" y="466" fill="#2e241c" font-family="Georgia, serif" font-size="30">HTML / CSS / JavaScript</text>
  <text x="520" y="516" fill="#7d6b5d" font-family="'Noto Serif TC', serif" font-size="28">章節教學、操作範例、章末練習、指令速查表</text>
</svg>
